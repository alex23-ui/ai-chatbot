<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Leads</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 30px;
    }
    .wrap {
      max-width: 1000px;
      margin: auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }
    th {
      background: #111827;
      color: white;
    }
    button {
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #dc2626;
      color: white;
    }
    .refresh {
      background: #111827;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Lead-uri chatbot</h1>
    <button class="refresh" onclick="loadLeads()">Refresh</button>
    <div id="content"></div>
  </div>

  <script>
    async function loadLeads() {
      const content = document.getElementById("content");
      content.innerHTML = "Se încarcă...";

      try {
        const res = await fetch("/api/leads");
        const data = await res.json();

        if (!data.length) {
          content.innerHTML = "Nu există lead-uri.";
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Nume</th>
                <th>Telefon</th>
                <th>Email</th>
                <th>Serviciu</th>
                <th>Detalii</th>
                <th>Creat</th>
                <th>Acțiune</th>
              </tr>
            </thead>
            <tbody>
        `;

        for (const item of data) {
          html += `
            <tr>
              <td>${item.name}</td>
              <td>${item.phone}</td>
              <td>${item.email}</td>
              <td>${item.service}</td>
              <td>${item.note}</td>
              <td>${new Date(item.createdAt).toLocaleString()}</td>
              <td><button onclick="deleteLead(${item.id})">Șterge</button></td>
            </tr>
          `;
        }

        html += `</tbody></table>`;
        content.innerHTML = html;
      } catch (error) {
        content.innerHTML = "Eroare la încărcare.";
      }
    }

    async function deleteLead(id) {
      await fetch("/api/leads/" + id, {
        method: "DELETE"
      });
      loadLeads();
    }

    loadLeads();
  </script>
</body>
</html>
