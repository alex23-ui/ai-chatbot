<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #111827;
      color: white;
    }

    #chat {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      background: #fafafa;
    }

    .msg {
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .user {
      text-align: right;
    }

    .user span {
      display: inline-block;
      background: #dbeafe;
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 75%;
    }

    .bot span {
      display: inline-block;
      background: #e5e7eb;
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 75%;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #eee;
      background: white;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
    }

    button {
      padding: 14px 18px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button:hover {
      opacity: 0.95;
    }

    .typing {
      color: #666;
      font-style: italic;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">AI Chatbot</div>

    <div id="chat"></div>

    <div class="input-area">
      <input id="message" type="text" placeholder="Scrie mesajul..." />
      <button onclick="sendMessage()">Trimite</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("message");
    const sessionId = localStorage.getItem("sessionId") || crypto.randomUUID();

    localStorage.setItem("sessionId", sessionId);

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "msg " + sender;
      div.innerHTML = `<span>${text}</span>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.id = "typing";
      div.textContent = "Botul scrie...";
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";
      addTyping();

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            sessionId
          })
        });

        const data = await res.json();
        removeTyping();
        addMessage(data.reply || "Fără răspuns", "bot");
      } catch (err) {
        removeTyping();
        addMessage("Eroare la server.", "bot");
      }
    }

    input.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
