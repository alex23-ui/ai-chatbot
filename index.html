</head>
<body>
  <h1>AI Chatbot</h1>

  <div id="chat"></div>

  <form id="chat-form">
    <input id="message" type="text" placeholder="Scrie mesajul..." required />
    <button type="submit">Trimite</button>
  </form>

  <script>
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message");
    const chat = document.getElementById("chat");

    function addMessage(sender, text, className) {
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<span class="${className}">${sender}:</span> ${text}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const message = input.value.trim();
      if (!message) return;

      addMessage("Tu", message, "user");
      input.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await res.json();

        if (data.reply) {
          addMessage("Bot", data.reply, "bot");
        } else {
          addMessage("Bot", data.error || "Eroare necunoscută.", "bot");
        }
      } catch (err) {
        addMessage("Bot", "Eroare la conectare cu serverul.", "bot");
      }
    });
  </script>
</body>
</html>
